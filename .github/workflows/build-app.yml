name: Build & Release Printara

on:
  push:
    tags:
      - 'app-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (.exe installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-app/package-lock.json

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci

      - name: Build installer
        working-directory: electron-app
        run: npx electron-forge make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: printara-windows
          path: electron-app/out/make/**/*.exe

  build-mac:
    name: macOS (.zip)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-app/package-lock.json

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci

      - name: Build app
        working-directory: electron-app
        run: npx electron-forge make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: printara-mac
          path: electron-app/out/make/**/*.zip

  build-linux:
    name: Linux (.deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-app/package-lock.json

      - name: Install system deps
        run: sudo apt-get install -y rpm fakeroot

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci

      - name: Build app
        working-directory: electron-app
        run: npx electron-forge make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: printara-linux
          path: |
            electron-app/out/make/**/*.deb
            electron-app/out/make/**/*.rpm

  release:
    name: Create GitHub Release
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - uses: softprops/action-gh-release@v2
        with:
          name: Printara ${{ github.ref_name }}
          body: |
            ## Printara — 3D Print Queue Manager

            Connect any WiFi 3D printer (OctoPrint, Moonraker/Klipper, Bambu Lab), queue G-code files, and Printara automatically starts the next job when one finishes.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows  | `PrintaraSetup.exe` |
            | macOS    | `Printara-darwin-x64.zip` |
            | Linux    | `printara_*.deb` / `printara-*.rpm` |

            ### Supported Printers
            - OctoPrint (any Marlin printer over WiFi)
            - Moonraker / Klipper
            - Bambu Lab X1, P1, A1 series (LAN mode)
          files: release-assets/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
