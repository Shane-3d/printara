server {
    listen 127.0.0.1:80;
    server_name printara.test www.printara.test *.printara.test;
    return 301 https://$host$request_uri;
}

server {
    listen 127.0.0.1:443 ssl;
    server_name printara.test www.printara.test *.printara.test;
    root /;
    charset utf-8;
    client_max_body_size 512M;
    http2 on;

    ssl_certificate     "C:/Users/ShaneVandekrol/.config/herd/config/valet/Certificates/printara.test.crt";
    ssl_certificate_key "C:/Users/ShaneVandekrol/.config/herd/config/valet/Certificates/printara.test.key";

    access_log off;
    error_log  "C:/Users/ShaneVandekrol/.config/herd/Log/nginx-error.log";

    # Proxy everything to server.js (handles static files + MQTT WS proxy + FTP proxy)
    location / {
        proxy_pass             http://127.0.0.1:3000;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_read_timeout     1800;
        proxy_connect_timeout  1800;
        proxy_buffering        off;
        proxy_redirect         off;
        chunked_transfer_encoding on;
    }

    location ~ /\.ht {
        deny all;
    }
}
